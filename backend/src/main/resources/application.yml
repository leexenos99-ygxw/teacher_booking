server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: teacher-booking-system
  profiles:
    active: local

  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:teacher_booking;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
      continue-on-error: true

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

  websocket:
    enabled: true

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.teacherbooking.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT配置
jwt:
  secret: ${JWT_SECRET:teacher-booking-system-secret-key-2024-very-long-secret}
  expiration: 86400000
  header: Authorization
  prefix: Bearer

# Knife4j配置
knife4j:
  enable: true
  setting:
    language: zh_cn
    enable-version: true
    enable-swagger-models: true

# 系统配置
system:
  default-avatar: /images/default-avatar.png
  upload-path: /data/upload/
  appointment:
    default-duration: 30
    max-days-ahead: 7
    cancel-before-hours: 2
  notification:
    remind-before-minutes: 30
  ai:
    enable: false
    api-key:
    api-url:

# 管理员账号配置（从环境变量读取，生产环境必须通过环境变量设置）
admin:
  username: ${ADMIN_USERNAME:admin}
  password: ${ADMIN_PASSWORD:}

# 日志配置
logging:
  level:
    com.teacherbooking: debug
    org.springframework.security: info
    org.springframework.web: info
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
